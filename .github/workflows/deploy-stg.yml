name: Deploy to Staging

on:
  push:
    branches: ['release', 'release/**']

jobs:
  deploy-stg:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & test
        run: |
          npm ci
          npm test

      - name: Build frontend
        run: npm run build

      - name: Generate image tag
        id: tag
        run: |
          BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/\//-/g')
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "IMAGE_TAG=${BRANCH}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          docker build -t $ECR_REGISTRY/chafah/landmark-web-app:$IMAGE_TAG .
          docker push $ECR_REGISTRY/chafah/landmark-web-app:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name landmark-eks --region us-east-1

      - name: Deploy to Kubernetes (staging namespace)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          sed -i 's/namespace: landmark/namespace: staging/g' k8s/*.yml
          sed -i "s|image: landmark-technologies:latest|image: $ECR_REGISTRY/chafah/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
          kubectl apply -f k8s/
